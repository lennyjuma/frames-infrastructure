apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frames-onprem
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/infrastructure.git
    targetRevision: HEAD
    path: workloads/on-prem
  destination:
    server: https://kubernetes.default.svc
    namespace: frames-onprem
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
