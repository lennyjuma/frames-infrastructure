apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onprem-base
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/lennyjuma/frames-infrastructure.git
    targetRevision: HEAD
    path: workloads/on-prem/base
  destination:
    server: https://kubernetes.default.svc
    namespace: frames-onprem
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
