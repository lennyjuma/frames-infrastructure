apiVersion: v1
kind: ConfigMap
metadata:
  name: tracker-config
data:
  TRITON_URL: "tritonserver:8001"
  QDRANT_URL: "http://qdrant:6333"
  QDRANT_COLLECTION: "reid_embeddings"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_BUCKET: "tracker-events"
  CLOUD_URL: "http://frames-cloud-service:8080"
  CONF_THRESHOLD: "0.75"
  IOU_THRESHOLD: "0.75"
  ALLOWED_CLASSES: "0,41"
  VLM_MODEL: "gemma-3"
  VLM_MAX_TOKENS: "1024"
  VLM_TIMEOUT: "120"
  VLM_MAX_IMAGE_EDGE: "256"
